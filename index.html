<div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card p-4 shadow opacity-75 " >

                    <h2 class="text-center mb-3">Heat Index Checker</h2>
                    <h5>↓ Note:</h5>
                    <e>Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.</e>

                    <h5 class="fw-bold">Degree in °C :</h5>
                     <input type="number" placeholder="Input number here" name="" id="temp" required>

                
                          
                          
            
                       
                       
                    

                    <h5 class="fw-bold"> Humidity in % :</h5>
                    <input type="number" placeholder="Input number here" name="" id="humidity" required>
                    

                    <button onclick="checkHeatIndex()">Check</button>
                    <p class="mt-3 fw-bold" id="result"></p>

                </div>
            </div>
        </div>
    </div>

    <script>
function checkHeatIndex() {

  if (
    document.getElementById("temp").value >= 20 &&
    document.getElementById("temp").value <= 24 &&
    document.getElementById("humidity").value >= 30 &&
    document.getElementById("humidity").value <= 50
  ) {
    document.getElementById("result").innerHTML =
      "Heat Index: ≤ 27°C<br>Status: Comfortable / Cool";
  }

  else if (
    document.getElementById("temp").value >= 25 &&
    document.getElementById("temp").value <= 27 &&
    document.getElementById("humidity").value >= 40 &&
    document.getElementById("humidity").value <= 60
  ) {
    document.getElementById("result").innerHTML =
      "Heat Index: 28 - 32°C<br>Status: Warm";
  }

  else if (
    document.getElementById("temp").value >= 28 &&
    document.getElementById("temp").value <= 31 &&
    document.getElementById("humidity").value >= 50 &&
    document.getElementById("humidity").value <= 70
  ) {
    document.getElementById("result").innerHTML =
      "Heat Index: 33 - 37°C<br>Status: Hot";
  }

  else if (
    document.getElementById("temp").value >= 32 &&
    document.getElementById("temp").value <= 35 &&
    document.getElementById("humidity").value >= 60 &&
    document.getElementById("humidity").value <= 80
  ) {
    document.getElementById("result").innerHTML =
      "Heat Index: 38 - 41°C<br>Status: Very Hot / Caution";
  }

  else if (
    document.getElementById("temp").value >= 36 &&
    document.getElementById("humidity").value >= 70 &&
    document.getElementById("humidity").value <= 100
  ) {
    document.getElementById("result").innerHTML =
      "Heat Index: ≥ 42°C<br>Status: Extreme Heat / Danger";
  }

  

}
</script>
